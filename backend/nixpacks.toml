# Nixpacks configuration for Spring Boot Backend
[phases.setup]
nixPkgs = ["maven", "openjdk17", "postgresql_17"]

[phases.build]
env = { MAVEN_OPTS = "-Xms256m -Xmx768m -XX:+UseG1GC -Djava.awt.headless=true" }
cmds = ["mvn -q -DskipTests clean package"]

[start]
env = { JAVA_OPTS = "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -Djava.awt.headless=true" }
cmd = "java ${JAVA_OPTS} -Dserver.port=${PORT:-8080} -jar target/backend-0.0.1-SNAPSHOT.jar"
