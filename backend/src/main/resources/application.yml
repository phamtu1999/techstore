spring:
  output:
    ansi:
      enabled: DETECT # Tự động nhận diện (Local hiện màu, Railway giữ sạch)

  application:
    name: backend

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ✅ PostgreSQL - an toàn hơn cho Railway under load
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:techstore}?sslmode=${POSTGRES_SSL_MODE:prefer}&options=-c%20timezone=Asia/Ho_Chi_Minh
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: 600000
      connection-timeout: 10000
      max-lifetime: 1800000
      leak-detection-threshold: 0
      pool-name: TechstorePool
      connection-test-query: SELECT 1
      keepalive-time: 60000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:DUMMY_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:DUMMY_SECRET}
            scope:
              - email
              - profile

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

    # ✅ Redis - thêm timeout và SSL cho Railway Redis
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
      timeout: 3000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
        shutdown-timeout: 200ms

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      key-prefix: "techstore:"
      use-key-prefix: true

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false # đã tắt ✅ - tốt
    show-sql: false # Để false vì đã có logback logger quản lý, tránh in lặp
    properties:
      hibernate:
        format_sql: false # ⬇ Tắt format SQL để tiết kiệm CPU trên Prod
        # ✅ Tối ưu batch insert/update - giảm số lần gọi DB
        jdbc:
          batch_size: 50
          fetch_size: 200
        order_inserts: true
        order_updates: true
        # ✅ Thống kê query chậm (chỉ bật khi debug)
        generate_statistics: false
        # ✅ Khớp với hikari auto-commit: false
        connection:
          provider_disables_autocommit: true

  # ✅ Tắt các auto-config không dùng để giảm startup time
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration

# ✅ Logging - giữ gọn, tắt noise
logging:
  level:
    com.techstore: INFO
    com.zaxxer.hikari: WARN
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %-40.40logger{39} : %msg%n"

app:
  storage:
    root: ${APP_STORAGE_ROOT:${RAILWAY_VOLUME_MOUNT_PATH:/app/data}}
  seed:
    demo-users:
      enabled: ${APP_SEED_DEMO_USERS_ENABLED:false}
      admin-password: ${APP_SEED_ADMIN_PASSWORD:}
      customer-password: ${APP_SEED_CUSTOMER_PASSWORD:}
  logging:
    dir: ${APP_LOG_DIR:${app.storage.root}/logs}
  backup:
    dir: ${APP_BACKUP_DIR:${app.storage.root}/backups}
    cleanup-orphan-records: ${APP_BACKUP_CLEANUP_ORPHAN_RECORDS:true}
    db-host: ${APP_BACKUP_DB_HOST:${POSTGRES_HOST:${PGHOST:postgres}}}
    db-port: ${APP_BACKUP_DB_PORT:${POSTGRES_PORT:${PGPORT:5432}}}
    db-name: ${APP_BACKUP_DB_NAME:${POSTGRES_DB:${PGDATABASE:techstore}}}
    ssl-mode: ${APP_BACKUP_DB_SSL_MODE:${POSTGRES_SSL_MODE:${PGSSLMODE:prefer}}}
    retention-count: ${APP_BACKUP_RETENTION_COUNT:10}
    schedule-enabled: ${APP_BACKUP_SCHEDULE_ENABLED:true}
    schedule-cron: "${APP_BACKUP_SCHEDULE_CRON:0 0 2 * * *}"
  upload:
    max-file-size-bytes: ${APP_UPLOAD_MAX_FILE_SIZE_BYTES:5242880}
    max-files-per-day: ${APP_UPLOAD_MAX_FILES_PER_DAY:50}
    allowed-content-types: ${APP_UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}

server:
  port: ${BACKEND_PORT:8081}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  shutdown: graceful
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:80}
      min-spare: ${TOMCAT_MIN_SPARE:10}
    connection-timeout: 15000
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:500}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

bff:
  url: ${BFF_URL:http://localhost:3000}

payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${FRONTEND_URL:http://localhost:5173}/payment-result
    ipn-url: ${BACKEND_URL:http://localhost:8080}/api/v1/payments/vnpay-ipn
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 900000
      refresh-expiration: 604800000
  supabase-storage:
    url: ${SUPABASE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:YOUR_SUPABASE_SERVICE_ROLE_KEY}
    bucket: ${SUPABASE_STORAGE_BUCKET:techstore}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
      sla:
        http.server.requests: 100ms,250ms,500ms,1s
  observation:
    http:
      server:
        requests:
          enabled: true

  mvc:
    async:
      request-timeout: 60000

# Chat configuration - Internal only
chat:
  enabled: true
