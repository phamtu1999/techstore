server {
    listen 8080; # Sẽ được ghi đè bằng lệnh khởi động
    server_name localhost;

    root /app/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Client body size limit
    client_max_body_size 10M;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
        # For index.html, we want no-cache
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Prevent Service Worker from caching old versions
    location ~* \.(service-worker\.js|sw\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Content-Type application/javascript;
        expires off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        return 200 'self.addEventListener("install", () => self.skipWaiting()); self.addEventListener("activate", () => self.clients.claim());';
    }

    location ~* \.js\.map$ {
        access_log off;
        log_not_found off;
        return 204;
    }



    # Cache static assets (except index.html and manifest)
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|webmanifest)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}
